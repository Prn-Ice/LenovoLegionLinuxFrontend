name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Flutter Test & Analyze
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Add legion_cli test stub
        run: |
          mkdir -p "$RUNNER_TEMP/bin"
          cat > "$RUNNER_TEMP/bin/legion_cli" <<'EOF'
          #!/usr/bin/env bash
          exit 0
          EOF
          chmod +x "$RUNNER_TEMP/bin/legion_cli"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Run tests
        run: flutter test --reporter=compact
